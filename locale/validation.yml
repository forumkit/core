validation:
  accepted: ":attribute 必须被接受。"
  active_url: ":attribute 不是一个有效的 URL。"
  after: ":attribute 必须是一个在 :date 之后的日期。"
  after_or_equal: ":attribute 必须是一个在 :date 之后或与其相同的日期。"
  alpha: ":attribute 必须只包含字母。"
  alpha_dash: ":attribute 必须只包含字母、数字、短划线和下划线。"
  alpha_num: ":attribute 必须只包含字母和数字。"
  array: ":attribute 必须是一个数组。"
  before: ":attribute 必须是一个在 :date 之前的日期。"
  before_or_equal: ":attribute 必须是一个在 :date 之前或与其相同的日期。"
  between:
    numeric: ":attribute 必须在 :min 和 :max 之间。"
    file: ":attribute 必须在 :min 和 :max 千字节之间。"
    string: ":attribute 的字符数必须在 :min 和 :max 之间。"
    array: ":attribute 必须包含 :min 到 :max 个元素。"
  boolean: ":attribute 字段必须为 true 或 false。"
  confirmed: ":attribute 的确认不匹配。"
  date: ":attribute 不是一个有效的日期。"
  date_equals: ":attribute 必须是一个与 :date 相同的日期。"
  date_format: ":attribute 不符合 :format 格式。"
  different: ":attribute 和 :other 必须不同。"
  digits: ":attribute 必须为 :digits 位数字。"
  digits_between: ":attribute 的数字位数必须在 :min 和 :max 之间。"
  dimensions: ":attribute 的图片尺寸无效。"
  distinct: ":attribute 字段有重复值。"
  email: ":attribute 必须是一个有效的电子邮件地址。"
  ends_with: ":attribute 必须以下列值之一结尾：:values。"
  exists: "所选的 :attribute 无效。"
  file: ":attribute 必须是一个文件。"
  file_too_large: ":attribute 太大。"
  file_upload_failed: ":attribute 上传失败。"
  filled: ":attribute 字段必须有一个值。"
  gt:
    numeric: ":attribute 必须大于 :value。"
    file: ":attribute 必须大于 :value 千字节。"
    string: ":attribute 的字符数必须大于 :value。"
    array: ":attribute 必须包含超过 :value 个元素。"
  gte:
    numeric: ":attribute 必须大于或等于 :value。"
    file: ":attribute 必须大于或等于 :value 千字节。"
    string: ":attribute 的字符数必须大于或等于 :value。"
    array: ":attribute 必须包含 :value 个元素或更多。"
  image: ":attribute 必须是一个图片。"
  in: "所选的 :attribute 无效。"
  in_array: ":attribute 字段在 :other 中不存在。"
  integer: ":attribute 必须是一个整数。"
  ip: ":attribute 必须是一个有效的 IP 地址。"
  ipv4: ":attribute 必须是一个有效的 IPv4 地址。"
  ipv6: ":attribute 必须是一个有效的 IPv6 地址。"
  json: ":attribute 必须是一个有效的 JSON 字符串。"
  lt:
    numeric: ":attribute 必须小于 :value。"
    file: ":attribute 必须小于 :value 千字节。"
    string: ":attribute 的字符数必须小于 :value。"
    array: ":attribute 必须包含少于 :value 个元素。"
  lte:
    numeric: ":attribute 必须小于或等于 :value。"
    file: ":attribute 必须小于或等于 :value 千字节。"
    string: ":attribute 的字符数必须小于或等于 :value。"
    array: ":attribute 必须不超过 :value 个元素。"
  max:
    numeric: ":attribute 的值不能超过 :max。"
    file: ":attribute 的大小不能超过 :max 千字节。"
    string: ":attribute 的字符数不能超过 :max。"
    array: ":attribute 的元素数量不能超过 :max。"
  mimes: ":attribute 必须是以下类型的文件：:values。"
  mimetypes: ":attribute 必须是以下类型的文件：:values。"
  min:
    numeric: ":attribute 必须至少为 :min。"
    file: ":attribute 必须至少为 :min 千字节。"
    string: ":attribute 必须至少包含 :min 个字符。"
    array: ":attribute 必须至少包含 :min 个元素。"
  multiple_of: ":attribute 必须是 :value 的倍数。"
  not_in: "所选的 :attribute 无效。"
  not_regex: ":attribute 的格式无效。"
  numeric: ":attribute 必须是一个数字。"
  password: "密码不正确。"
  present: ":attribute 字段必须存在。"
  regex: ":attribute 的格式无效。"
  required: ":attribute 字段是必填项。"
  required_if: "当 :other 为 :value 时，:attribute 字段是必填项。"
  required_unless: "除非 :other 在 :values 中，否则 :attribute 字段是必填项。"
  required_with: "当 :values 存在时，:attribute 字段是必填项。"
  required_with_all: "当所有 :values 都存在时，:attribute 字段是必填项。"
  required_without: "当 :values 不存在时，:attribute 字段是必填项。"
  required_without_all: "当 :values 中的任何一项都不存在时，:attribute 字段是必填项。"
  prohibited: ":attribute 字段被禁止。"
  prohibited_if: "当 :other 为 :value 时，:attribute 字段被禁止。"
  prohibited_unless: "除非 :other 在 :values 中，否则 :attribute 字段被禁止。"
  same: ":attribute 和 :other 必须匹配。"
  size:
    numeric: ":attribute 必须为 :size。"
    file: ":attribute 必须为 :size 千字节。"
    string: ":attribute 必须为 :size 个字符。"
    array: ":attribute 必须包含 :size 个元素。"
  starts_with: ":attribute 必须以下列值之一开头：:values。"
  string: ":attribute 必须是一个字符串。"
  timezone: ":attribute 必须是一个有效的时区。"
  unique: ":attribute 已经被占用。"
  uploaded: ":attribute 上传失败。"
  url: ":attribute 格式无效。"
  uuid: ":attribute 必须是一个有效的 UUID。"

  attributes:
    username: 用户名
    password: 密码
    email: 电子邮件
    title: 标题
    content: 内容
    name_singular: 单数名称
    name_plural: 复数名称
    tag_count_primary: 主要标签数量
    tag_count_secondary: 次要标签数量
